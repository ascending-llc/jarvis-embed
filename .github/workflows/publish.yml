name: Bump version, publish to npm and GitHub Pages

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run mode'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'landing/**'

permissions:
  contents: write

jobs:
  bump-version-and-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version tag
        id: tag
        uses: anothrNick/github-tag-action@master
        env:
          VERBOSE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_API_TAGGING: false
          TAG_PREFIX: 'v'
          DRY_RUN: ${{ inputs.dry_run }}
          DEFAULT_BUMP: ${{ inputs.version_type }}

  publish:
    runs-on: ubuntu-latest
    needs: bump-version-and-tag
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    steps:
      - name: Checkout at new tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version-and-tag.outputs.new_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Extract version without prefix
        id: version
        run: |
          VERSION="${{ needs.bump-version-and-tag.outputs.new_version }}"
          echo "clean=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Set package version from tag
        run: npm version "${{ steps.version.outputs.clean }}" --no-git-tag-version --allow-same-version

      - run: npm ci
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy to GitHub Pages
        run: |
          VERSION="${{ steps.version.outputs.clean }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if gh-pages branch exists, create orphan if not
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          # Copy versioned JS build
          mkdir -p /tmp/gh-pages/$VERSION
          cp dist/index.global.js /tmp/gh-pages/$VERSION/jarvis-embed.js

          # Update latest
          mkdir -p /tmp/gh-pages/latest
          cp dist/index.global.js /tmp/gh-pages/latest/jarvis-embed.js

          # Assemble landing page: inject rendered README into template
          npx --yes marked README.md > /tmp/readme.html
          node -e "
            const fs = require('fs');
            const template = fs.readFileSync('landing/template.html', 'utf8');
            const readme = fs.readFileSync('/tmp/readme.html', 'utf8');
            fs.writeFileSync('/tmp/gh-pages/index.html', template.replace('{{README_CONTENT}}', readme));
          "
          cp -r landing/assets /tmp/gh-pages/assets

          cd /tmp/gh-pages
          git add .
          git commit -m "Deploy v$VERSION"
          git push origin gh-pages

  deploy-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Deploy docs to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          # Assemble landing page only — leave JS folders untouched
          npx --yes marked README.md > /tmp/readme.html
          node -e "
            const fs = require('fs');
            const template = fs.readFileSync('landing/template.html', 'utf8');
            const readme = fs.readFileSync('/tmp/readme.html', 'utf8');
            fs.writeFileSync('/tmp/gh-pages/index.html', template.replace('{{README_CONTENT}}', readme));
          "
          cp -r landing/assets /tmp/gh-pages/assets

          cd /tmp/gh-pages
          git add .
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Update docs [skip ci]"
          git push origin gh-pages
