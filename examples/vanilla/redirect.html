<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signing in…</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9fafb; }
    .message { text-align: center; color: #6b7280; }
    .message h2 { color: #111; margin-bottom: 8px; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="message" id="message">
    <h2>Signing you in…</h2>
    <p>Please wait.</p>
  </div>

  <script>
    async function handleRedirect() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      if (error) {
        document.getElementById('message').innerHTML = `<h2 class="error">Sign-in failed</h2><p>${error}</p>`;
        return;
      }

      if (!code) {
        window.location.href = '/';
        return;
      }

      const res = await fetch('/api/google/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });

      const data = await res.json();

      if (!res.ok) {
        document.getElementById('message').innerHTML = `<h2 class="error">Token exchange failed</h2><p>${data.error}</p>`;
        return;
      }

      sessionStorage.setItem('google_id_token', data.token);
      window.location.href = '/';
    }

    handleRedirect();
  </script>
</body>
</html>
